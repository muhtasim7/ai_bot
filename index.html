<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhtasim AI v1.0 🚀</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121212; color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1f1f1f; padding: 15px; text-align: center; border-bottom: 1px solid #333; }
        header h1 { margin: 0; font-size: 1.2rem; color: #ff4757; }
        header p { margin: 5px 0 0; font-size: 0.8rem; color: #aaa; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; }
        .user { background: #ff4757; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bot { background: #2f3542; color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        #input-container { padding: 15px; background: #1f1f1f; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border: none; border-radius: 25px; background: #2f3542; color: white; outline: none; font-size: 1rem; }
        button { background: #ff4757; border: none; color: white; padding: 0 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>Muhtasim AI (Birthday Edition) 🎁</h1>
        <p>Online 24/7 • Ready to hype you up</p>
    </header>

    <div id="chat-container">
        <div class="message bot">happy birthday zoya!! 🎉 ask me anything layout, im literally here to celebrate you all day long 😤</div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        // PASTE YOUR RENDER URL HERE (Make sure it ends with /chat)
        const BACKEND_URL = "https://YOUR-RENDER-APP-NAME.onrender.com/chat";

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const messageText = inputField.value.trim();
            if (!messageText) return;

            inputField.value = '';
            appendMessage(messageText, 'user');

            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: messageText })
                });
                const data = await response.json();
                appendMessage(data.reply, 'bot');
            } catch (error) {
                appendMessage("oof backend link dropped, try again in a sec!", 'bot');
            }
        }

        function appendMessage(text, sender) {
            const container = document.getElementById('chat-container');
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.innerText = text;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
